name: Build Raspberry Pi OS image (auto-start mqtt_client)

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    tags:
      - v*

permissions:
  contents: write

jobs:
  build-image:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (binfmt) for ARM
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm,arm64

      - name: Install host deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git rsync coreutils quilt parted qemu-user-static binfmt-support debootstrap \
            zerofree zip dosfstools libarchive-tools libcap2-bin grep xz-utils file curl

      - name: Ensure qemu-arm is available for pi-gen
        run: |
          command -v qemu-arm-static
          sudo ln -sf "$(command -v qemu-arm-static)" /usr/local/bin/qemu-arm
          if command -v qemu-aarch64-static >/dev/null 2>&1; then
            sudo ln -sf "$(command -v qemu-aarch64-static)" /usr/local/bin/qemu-aarch64
          fi
          echo "qemu-arm -> $(readlink -f /usr/local/bin/qemu-arm)"
          qemu-arm --version

      - name: Clone pi-gen (Bookworm if available)
        run: |
          git clone https://github.com/RPi-Distro/pi-gen.git
          cd pi-gen
          git fetch --all --tags
          if git show-ref --verify --quiet refs/remotes/origin/bookworm; then
            git checkout -b bookworm origin/bookworm
          elif git rev-parse -q --verify "refs/tags/bookworm" >/dev/null; then
            git checkout "bookworm"
          fi
          echo "pi-gen branch/tag:"
          git rev-parse --abbrev-ref HEAD
          git log -1 --oneline

      - name: Add custom stage + app payload
        run: |
          # 1) Crée le stage de customisation
          mkdir -p pi-gen/stage2/04-mqtt/files

          # 2) Copie l’app dans le payload pi-gen (dans l’image)
          mkdir -p pi-gen/stage2/04-mqtt/files/app
          rsync -a ./src ./README.md ./watch_gpio.py pi-gen/stage2/04-mqtt/files/app/

          # 2b) Configuration Mosquitto pour écoute réseau
          mkdir -p pi-gen/stage2/04-mqtt/files/mosquitto
          cat > pi-gen/stage2/04-mqtt/files/mosquitto/listener.conf <<'EOF'
          listener 1883 0.0.0.0
          allow_anonymous true
          EOF

          # 3) Ajoute le service systemd
          mkdir -p pi-gen/stage2/04-mqtt/files/systemd
          cat > pi-gen/stage2/04-mqtt/files/systemd/mqtt-client.service <<'EOF'
          [Unit]
          Description=MQTT Client (buzzer)
          Wants=network-online.target
          After=network-online.target mosquitto.service
          
          [Service]
          Type=simple
          User=pi
          Group=pi
          WorkingDirectory=/opt/mqttPython/src
          Environment=PYTHONUNBUFFERED=1
          Environment=GPIOZERO_PIN_FACTORY=lgpio
          ExecStart=/opt/mqttPython/venv/bin/python /opt/mqttPython/src/mqtt_client.py
          Restart=always
          RestartSec=3
          
          [Install]
          WantedBy=multi-user.target
          EOF

          # 4) Script d’installation exécuté pendant le build
          cat > pi-gen/stage2/04-mqtt/00-run.sh <<'EOF'
          #!/bin/bash -e

          install -d "${ROOTFS_DIR}/opt/mqttPython"
          rsync -a "${STAGE_DIR}/04-mqtt/files/app/" "${ROOTFS_DIR}/opt/mqttPython/"

          install -d "${ROOTFS_DIR}/etc/mosquitto/conf.d"
          install -m 0644 "${STAGE_DIR}/04-mqtt/files/mosquitto/listener.conf" \
            "${ROOTFS_DIR}/etc/mosquitto/conf.d/listener.conf"

          # Dépendances système
          on_chroot <<'CHROOT_EOF'
          set -e
          apt-get update
          apt-get install -y --no-install-recommends \
            mosquitto mosquitto-clients \
            python3 python3-pip python3-venv \
            python3-dev gcc build-essential \
            python3-lgpio
          chown -R pi:pi /opt/mqttPython
          systemctl enable mosquitto
          CHROOT_EOF

          # venv + dépendances python
          on_chroot <<'CHROOT_EOF'
          set -e
          python3 -m venv --system-site-packages /opt/mqttPython/venv
          /opt/mqttPython/venv/bin/pip install --upgrade pip
          /opt/mqttPython/venv/bin/pip install amqtt gpiozero
          CHROOT_EOF

          # Service systemd
          install -d "${ROOTFS_DIR}/etc/systemd/system"
          install -m 0644 "${STAGE_DIR}/04-mqtt/files/systemd/mqtt-client.service" \
            "${ROOTFS_DIR}/etc/systemd/system/mqtt-client.service"

          on_chroot <<'CHROOT_EOF'
          set -e
          systemctl enable mqtt-client.service
          CHROOT_EOF
          EOF
          chmod +x pi-gen/stage2/04-mqtt/00-run.sh

      - name: Configure pi-gen
        env:
          PI_PASSWORD: ${{ secrets.PI_PASSWORD }}
        run: |
          if [ -z "${PI_PASSWORD}" ]; then
            echo "Missing secrets.PI_PASSWORD. Please add it in GitHub repo settings."
            exit 1
          fi

          cat > pi-gen/config <<EOF
          IMG_NAME="buzzer-central"
          RELEASE="bookworm"
          DEPLOY_ZIP=0
          ENABLE_SSH=1

          # Ne build QUE les stages nécessaires (évite "full" etc.)
          STAGE_LIST="stage0 stage1 stage2"

          FIRST_USER_NAME="pi"
          FIRST_USER_PASS="${PI_PASSWORD}"

          # Évite l'assistant de renommage/création d'utilisateur au 1er boot
          DISABLE_FIRST_BOOT_USER_RENAME=1
          EOF

          touch pi-gen/stage2/04-mqtt/SKIP
          rm -f pi-gen/stage2/04-mqtt/SKIP

      - name: Build image (Docker)
        run: |
          cd pi-gen
          sudo ./build-docker.sh

      - name: Post-build verify (mount rootfs and check service)
        run: |
          set -euo pipefail

          IMG="$(ls -1 pi-gen/deploy/*-lite.img | head -n 1)"
          echo "Using IMG: $IMG"
          ls -lah "$IMG"

          # Attache l'image en loop + partitions (/dev/loopXp1, /dev/loopXp2, ...)
          LOOP_DEV="$(sudo losetup --find --show --partscan "$IMG")"
          echo "Loop device: $LOOP_DEV"
          sudo lsblk "$LOOP_DEV"

          # En général: p1 = boot (FAT), p2 = root (ext4)
          ROOT_PART="${LOOP_DEV}p2"
          if [ ! -b "$ROOT_PART" ]; then
            echo "Root partition not found at $ROOT_PART"
            sudo losetup -d "$LOOP_DEV"
            exit 1
          fi

          sudo mkdir -p /mnt/rpi-root
          sudo mount "$ROOT_PART" /mnt/rpi-root

          echo "Checking expected files in rootfs..."
          sudo test -f /mnt/rpi-root/etc/systemd/system/mqtt-client.service
          sudo test -L /mnt/rpi-root/etc/systemd/system/multi-user.target.wants/mqtt-client.service
          sudo test -f /mnt/rpi-root/opt/mqttPython/src/mqtt_client.py
          sudo test -x /mnt/rpi-root/opt/mqttPython/venv/bin/python
          sudo test -f /mnt/rpi-root/etc/mosquitto/conf.d/listener.conf

          echo "OK: service + app + venv + mosquitto config present."

          sudo umount /mnt/rpi-root
          sudo losetup -d "$LOOP_DEV"

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: buzzer-central-lite
          path: pi-gen/deploy/*-lite.img
          if-no-files-found: error

      - name: Publish image to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: pi-gen/deploy/*-lite.img
          generate_release_notes: true
